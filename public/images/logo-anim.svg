<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="face" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#ff4a74"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clip">
      <rect width="280" height="280"/>
    </clipPath>
  </defs>

  <!-- Background transparent -->

  <!-- Background glow pulse -->
  <circle cx="140" cy="145" r="65" fill="#e11d48" fill-opacity="0.05">
    <animate attributeName="r" values="60;82;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="fill-opacity" values="0.04;0.13;0.04" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="140" cy="145" r="45" fill="#a855f7" fill-opacity="0.04">
    <animate attributeName="r" values="40;58;40" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
    <animate attributeName="fill-opacity" values="0.03;0.10;0.03" dur="3.2s" repeatCount="indefinite" begin="0.8s"/>
  </circle>

  <!-- Rotating logo block -->
  <g>
    <animateTransform attributeName="transform" type="rotate"
      values="0 140 145; 13 140 145; 0 140 145; -13 140 145; 0 140 145"
      dur="10s" repeatCount="indefinite"
      calcMode="spline"
      keyTimes="0;0.25;0.5;0.75;1"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <!-- Depth layers (deepest first, front last) -->
    <rect x="102" y="107" width="108" height="108" rx="18" fill="#3d0509" fill-opacity="0.55"/>
    <rect x="98"  y="103" width="108" height="108" rx="18" fill="#5a0a12" fill-opacity="0.65"/>
    <rect x="94"  y="99"  width="108" height="108" rx="18" fill="#7a0e1b" fill-opacity="0.75"/>
    <rect x="90"  y="95"  width="108" height="108" rx="18" fill="#a01224" fill-opacity="0.85"/>

    <!-- Glow halo -->
    <rect x="86" y="91" width="108" height="108" rx="18" fill="#e11d48" fill-opacity="0.38" filter="url(#glow)"/>

    <!-- Main face -->
    <rect x="86" y="91" width="108" height="108" rx="18" fill="url(#face)"/>

    <!-- Light reflection top -->
    <rect x="86" y="91" width="108" height="42" rx="18" fill="white" fill-opacity="0.20"/>
    <!-- Light reflection left -->
    <rect x="86" y="91" width="42" height="108" rx="18" fill="white" fill-opacity="0.07"/>

    <!-- "</>" text -->
    <text
      x="140" y="145"
      text-anchor="middle"
      dominant-baseline="middle"
      font-family="'JetBrains Mono','Courier New',Courier,monospace"
      font-size="34"
      font-weight="900"
      fill="white"
      fill-opacity="0.97"
      filter="url(#tglow)">&lt;/&gt;</text>
  </g>

  <!-- Corner brackets -->
  <g fill="none" stroke="#e11d48" stroke-width="2" stroke-opacity="0.6">
    <path d="M12,24 L12,12 L24,12"/>
    <path d="M268,24 L268,12 L256,12"/>
    <path d="M12,256 L12,268 L24,268"/>
    <path d="M268,256 L268,268 L256,268"/>
  </g>

  <!-- Scan line -->
  <rect x="0" y="-3" width="280" height="2.5" fill="white" fill-opacity="0.07" clip-path="url(#clip)">
    <animate attributeName="y" values="-3;283" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Decorative pulse line below block -->
  <line x1="112" y1="220" x2="168" y2="220" stroke="#e11d48" stroke-width="1" stroke-opacity="0.4">
    <animate attributeName="stroke-opacity" values="0.35;0.75;0.35" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="x1" values="112;120;112" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="x2" values="168;160;168" dur="2.5s" repeatCount="indefinite"/>
  </line>
</svg>
