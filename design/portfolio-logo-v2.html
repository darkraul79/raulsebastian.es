<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raúl Sebastián — Logo Concept v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rose:       #e11d48;
  --rose-l:     #fb7185;
  --purple:     #a855f7;
  --purple-l:   #c084fc;
  --bg:         #070712;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  background-image:
    radial-gradient(1200px 600px at 20% 10%, rgba(225,29,72,0.30), transparent 55%),
    radial-gradient(900px 500px at 70% 70%, rgba(168,85,247,0.22), transparent 60%);
  color: rgba(255,255,255,0.92);
  overflow-x: hidden;
  min-height: 100vh;
}

/* Scanlines */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent 0%, transparent 50%,
    rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05) 100%
  );
  background-size: 100% 4px;
  pointer-events: none; z-index: 9999;
}

/* ── Canvas ── */
#bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
}

/* ── Nav ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 60px; padding: 0 clamp(1.5rem,4vw,3rem);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(7,7,18,0.65); backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.055);
}
.nav-brand {
  display: flex; align-items: center; gap: 8px;
  font-family: 'Space Grotesk', sans-serif; font-weight: 800; font-size: 21px;
  letter-spacing: -0.03em; color: #fff; text-decoration: none;
}
.dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--rose));
  box-shadow: 0 0 16px rgba(225,29,72,0.6);
}
.nav-links { display: flex; gap: 1.75rem; list-style: none; }
.nav-links a {
  color: rgba(255,255,255,0.6); text-decoration: none;
  font-size: 14px; font-weight: 500; transition: color .2s, text-shadow .2s;
}
.nav-links a:hover { color: #fff; text-shadow: 0 0 14px rgba(225,29,72,0.5); }

/* ── Hero ── */
#hero {
  position: relative; z-index: 2;
  min-height: 100vh; display: flex; align-items: center;
  padding-top: 60px;
}
.hero-grid {
  max-width: 1160px; margin: 0 auto;
  padding: 0 clamp(1.5rem,4vw,3rem);
  display: grid; grid-template-columns: 1.1fr 0.9fr;
  gap: clamp(2rem,5vw,5rem); align-items: center; width: 100%;
}

/* ── Hero text ── */
.hero-text h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(48px,7vw,88px); font-weight: 800;
  line-height: 1; letter-spacing: -0.04em; margin-bottom: 1.2rem;
}
.h1-grad {
  display: block;
  background: linear-gradient(135deg, var(--rose-l), var(--rose) 40%, var(--purple));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-mono {
  font-family: 'JetBrains Mono', monospace; font-size: 14px;
  color: var(--rose-l); letter-spacing: .08em; margin-bottom: 1.2rem;
}
.hero-mono::before { content: '> '; color: var(--purple); }
.hero-p {
  font-size: 16px; color: rgba(255,255,255,.68); line-height: 1.75;
  max-width: 50ch; margin-bottom: 2rem;
}
.btns { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 2rem; }
.btn {
  padding: 11px 22px; border-radius: 14px; font-size: 14px; font-weight: 600;
  text-decoration: none; border: 1px solid rgba(255,255,255,.12); cursor: pointer;
  backdrop-filter: blur(8px); transition: all .25s; color: #fff;
}
.btn-p {
  background: linear-gradient(135deg, rgba(225,29,72,.9), rgba(168,85,247,.75));
  border-color: rgba(225,29,72,.4); box-shadow: 0 8px 28px rgba(225,29,72,.2);
}
.btn-p:hover {
  background: linear-gradient(135deg, #f43f5e, #c084fc);
  box-shadow: 0 12px 40px rgba(225,29,72,.4); transform: translateY(-2px) scale(1.02);
}
.btn-g { background: rgba(255,255,255,.05); }
.btn-g:hover {
  background: linear-gradient(135deg,rgba(225,29,72,.1),rgba(168,85,247,.1));
  border-color: rgba(168,85,247,.3); transform: translateY(-2px);
}
.badges { display: flex; flex-wrap: wrap; gap: 7px; }
.badge {
  padding: 5px 13px; border-radius: 100px; font-size: 12px; font-weight: 500;
  font-family: 'JetBrains Mono', monospace;
  border: 1px solid rgba(255,255,255,.09); background: rgba(255,255,255,.04);
  color: rgba(255,255,255,.65); cursor: default; transition: all .25s;
}
.badge:hover {
  color: #fff; background: linear-gradient(135deg,rgba(225,29,72,.15),rgba(168,85,247,.15));
  border-color: rgba(168,85,247,.35); transform: translateY(-2px) scale(1.04);
}

/* ══════════════════════════════════════════
   LOGO WRAP — el conjunto de la animación
══════════════════════════════════════════ */
.logo-wrap {
  position: relative;
  width: 100%; max-width: 480px;
  aspect-ratio: 1 / 1;
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
}

/* ── Retrowave Sun ── */
.sun-outer {
  position: absolute;
  width: 55%; padding-top: 27.5%;
  bottom: 10%; left: 50%;
  transform: translateX(-50%);
  z-index: 1;
  overflow: visible;
}
.sun {
  position: absolute;
  inset: 0;
  border-radius: 200px 200px 0 0;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.05) 0%,
    #ff4a74 10%,
    #e11d48 40%,
    #a855f7 75%,
    #7c3aed 100%
  );
  overflow: hidden;
  animation: sun-rise 12s ease-out forwards;
}
@keyframes sun-rise {
  0%   { transform: scaleY(0); transform-origin: bottom; opacity:0; }
  30%  { opacity: 1; }
  100% { transform: scaleY(1); transform-origin: bottom; }
}
.sun::after {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px, transparent 13px,
    rgba(7,7,18,0.85) 13px, rgba(7,7,18,0.85) 16px
  );
}
/* Horizon glow line under sun */
.sun-horizon {
  position: absolute;
  bottom: 10%; left: 50%;
  transform: translateX(-50%);
  width: 80%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(225,29,72,0.8), rgba(168,85,247,0.6), transparent);
  filter: blur(2px);
  z-index: 2;
  animation: horizon-pulse 3s ease-in-out infinite;
}
@keyframes horizon-pulse {
  0%,100% { opacity: 0.7; }
  50%      { opacity: 1; filter: blur(3px); }
}

/* ── Orbital rings ── */
.rings {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  perspective: 900px;
  z-index: 3;
}
.ring {
  position: absolute;
  border-radius: 50%;
  transform-style: preserve-3d;
}
/* Ring 1 — horizontal plane, rose */
.r1 {
  width: 90%; height: 90%;
  border: 1.5px solid rgba(225,29,72,0.55);
  box-shadow: 0 0 18px rgba(225,29,72,0.25), inset 0 0 18px rgba(225,29,72,0.1);
  animation: ring1 7s linear infinite;
}
@keyframes ring1 {
  from { transform: rotateX(72deg) rotateZ(0deg); }
  to   { transform: rotateX(72deg) rotateZ(360deg); }
}
/* Ring 2 — tilted, purple */
.r2 {
  width: 75%; height: 75%;
  border: 1px solid rgba(168,85,247,0.45);
  box-shadow: 0 0 14px rgba(168,85,247,0.2), inset 0 0 14px rgba(168,85,247,0.08);
  animation: ring2 10s linear infinite;
}
@keyframes ring2 {
  from { transform: rotateX(55deg) rotateY(25deg) rotateZ(0deg); }
  to   { transform: rotateX(55deg) rotateY(25deg) rotateZ(-360deg); }
}
/* Ring 3 — near-vertical, rose-light */
.r3 {
  width: 60%; height: 60%;
  border: 1px solid rgba(251,113,133,0.35);
  box-shadow: 0 0 10px rgba(251,113,133,0.18);
  animation: ring3 13s linear infinite;
}
@keyframes ring3 {
  from { transform: rotateX(20deg) rotateY(80deg) rotateZ(0deg); }
  to   { transform: rotateX(20deg) rotateY(80deg) rotateZ(360deg); }
}

/* Ring dots — lit nodes that orbit */
.ring-dot {
  position: absolute;
  width: 6px; height: 6px; border-radius: 50%;
  background: radial-gradient(circle, #fff 0%, var(--rose) 60%);
  box-shadow: 0 0 8px 2px rgba(225,29,72,0.8);
  top: 50%; left: 50%;
  transform-origin: 0 0;
}

/* ── Central glow pulse ── */
.glow-core {
  position: absolute;
  width: 60%; height: 60%;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(225,29,72,0.22) 0%,
    rgba(168,85,247,0.12) 40%,
    transparent 70%
  );
  animation: core-pulse 2.8s ease-in-out infinite;
  z-index: 2;
}
@keyframes core-pulse {
  0%,100% { transform: scale(1);    opacity: 0.8; }
  50%      { transform: scale(1.35); opacity: 1; }
}

/* ── 3D Logo stage ── */
.logo-stage {
  position: absolute;
  width: 55%; aspect-ratio: 4/3;
  perspective: 1400px;
  perspective-origin: 50% 45%;
  container-type: size;
  z-index: 4;
  transition: filter 0.1s;
}
.logo-stage.glitching {
  animation: glitch-logo 0.35s steps(3) forwards;
}
@keyframes glitch-logo {
  0%  { transform: none; filter: none; }
  20% { transform: translate(-5px, 2px) skewX(3deg);
        filter: hue-rotate(80deg) saturate(3) brightness(1.4); }
  40% { transform: translate(5px,-2px) skewX(-3deg);
        filter: hue-rotate(-80deg) saturate(2); }
  60% { transform: translate(-2px,0) scaleY(0.97);
        filter: brightness(2); }
  80% { transform: translate(3px,1px);
        filter: hue-rotate(40deg); }
  100%{ transform: none; filter: none; }
}

.stage {
  width: 100%; height: 100%;
  position: relative; transform-style: preserve-3d;
}
.layer {
  position: absolute; inset: 0;
  transform-style: preserve-3d;
  animation: rotmio 5s infinite alternate ease-in-out;
  transform: rotateY(35deg) rotateX(28deg) translateZ(0);
}
.layer::before {
  content: '';
  position: absolute; border-radius: 18%;
  width: 75cqh; height: 75cqh; max-width: 75cqw; max-height: 75cqw;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  background:
    radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,0.28), transparent 55%),
    radial-gradient(120% 120% at 70% 85%, rgba(0,0,0,0.28), transparent 60%),
    linear-gradient(145deg, #ff4a74, #e11d48);
  box-shadow:
    inset 0 15px 25px rgba(255,255,255,0.18),
    inset 0 -20px 30px rgba(0,0,0,0.32),
    0 0 40px rgba(225,29,72,0.35);
  z-index: 1;
}
.layer::after {
  content: '</>';
  position: absolute; display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace; font-weight: 900; pointer-events: none;
  width: 75cqh; height: 75cqh; max-width: 75cqw; max-height: 75cqw;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: clamp(32px, 28cqh, 80px); letter-spacing: -0.08em;
  color: rgba(255,255,255,0.98);
  text-shadow: 0 1px 0 rgba(255,255,255,.35), 0 -2px 4px rgba(0,0,0,.20),
               0 0 20px rgba(255,255,255,0.4);
  z-index: 2;
}
/* Layer Z offsets */
.layer:nth-child(1)::before  { transform: translate(-50%,-50%) translateZ(0px) }
.layer:nth-child(2)::before  { transform: translate(-50%,-50%) translateZ(-3px) }
.layer:nth-child(3)::before  { transform: translate(-50%,-50%) translateZ(-6px) }
.layer:nth-child(4)::before  { transform: translate(-50%,-50%) translateZ(-9px) }
.layer:nth-child(5)::before  { transform: translate(-50%,-50%) translateZ(-12px) }
.layer:nth-child(6)::before  { transform: translate(-50%,-50%) translateZ(-15px) }
.layer:nth-child(7)::before  { transform: translate(-50%,-50%) translateZ(-18px) }
.layer:nth-child(8)::before  { transform: translate(-50%,-50%) translateZ(-21px) }
.layer:nth-child(9)::before  { transform: translate(-50%,-50%) translateZ(-24px) }
.layer:nth-child(10)::before { transform: translate(-50%,-50%) translateZ(-27px) }
.layer:nth-child(11)::before { transform: translate(-50%,-50%) translateZ(-30px) }
.layer:nth-child(12)::before { transform: translate(-50%,-50%) translateZ(-33px) }
.layer:nth-child(13)::before { transform: translate(-50%,-50%) translateZ(-36px) }
.layer:nth-child(14)::before { transform: translate(-50%,-50%) translateZ(-39px) }
.layer:nth-child(15)::before { transform: translate(-50%,-50%) translateZ(-42px) }
.layer:nth-child(16)::before { transform: translate(-50%,-50%) translateZ(-45px) }
.layer:nth-child(17)::before { transform: translate(-50%,-50%) translateZ(-48px) }
.layer:nth-child(18)::before { transform: translate(-50%,-50%) translateZ(-51px) }
.layer:nth-child(19)::before { transform: translate(-50%,-50%) translateZ(-54px) }
.layer:nth-child(20)::before { transform: translate(-50%,-50%) translateZ(-57px) }
.layer:nth-child(1)::after   { transform: translate(-50%,-50%) translateZ(10px) }
.layer:nth-child(2)::after   { transform: translate(-50%,-50%) translateZ(8px) }
.layer:nth-child(3)::after   { transform: translate(-50%,-50%) translateZ(6px) }
.layer:nth-child(4)::after   { transform: translate(-50%,-50%) translateZ(4px) }
.layer:nth-child(5)::after   { transform: translate(-50%,-50%) translateZ(2px) }
.layer:nth-child(6)::after   { transform: translate(-50%,-50%) translateZ(0px) }
.layer:nth-child(7)::after   { transform: translate(-50%,-50%) translateZ(-2px) }
.layer:nth-child(8)::after   { transform: translate(-50%,-50%) translateZ(-4px) }
.layer:nth-child(9)::after   { transform: translate(-50%,-50%) translateZ(-6px) }
.layer:nth-child(10)::after  { transform: translate(-50%,-50%) translateZ(-8px) }
.layer:nth-child(n+2):not(:nth-child(n+11))::after {
  color: rgba(255,255,255,.90); filter: brightness(.94);
  -webkit-text-stroke: 1px rgba(0,0,0,.12);
  text-shadow: 0 1px 0 rgba(255,255,255,.25), 0 -1px 2px rgba(0,0,0,.18);
}
.layer:nth-child(n+6):not(:nth-child(n+11))::after  { color: rgba(255,255,255,.78); filter: brightness(.88) }
.layer:nth-child(n+11)::after { content: ''; display: none }
@keyframes rotmio { 100% { transform: rotateY(-35deg) rotateX(-38deg) } }
@media(prefers-reduced-motion:reduce){ .layer { animation: none } }

/* ── Horizontal scan beam ── */
.scan {
  position: absolute; left: 5%; right: 5%; height: 2px;
  background: linear-gradient(90deg, transparent, rgba(225,29,72,0.75), rgba(168,85,247,0.55), transparent);
  filter: blur(1.5px);
  z-index: 5;
  animation: scan-beam 5s ease-in-out infinite;
}
@keyframes scan-beam {
  0%, 100% { top: 8%;  opacity: 0; }
  8%        { opacity: 1; }
  92%       { opacity: 0.9; }
  50%       { top: 92%; }
}

/* ── Corner tech-frame decorations ── */
.corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: rgba(225,29,72,0.5);
  border-style: solid;
  z-index: 6;
}
.corner.tl { top: 8%;  left: 8%;  border-width: 2px 0 0 2px; border-radius: 3px 0 0 0 }
.corner.tr { top: 8%;  right: 8%; border-width: 2px 2px 0 0; border-radius: 0 3px 0 0 }
.corner.bl { bottom: 8%; left: 8%;  border-width: 0 0 2px 2px; border-radius: 0 0 0 3px }
.corner.br { bottom: 8%; right: 8%; border-width: 0 2px 2px 0; border-radius: 0 0 3px 0 }

/* Corner blink animation */
.corner { animation: corner-blink 4s ease-in-out infinite; }
.corner.tr { animation-delay: 1s; }
.corner.bl { animation-delay: 2s; }
.corner.br { animation-delay: 3s; }
@keyframes corner-blink {
  0%,90%,100% { opacity: 0.5; }
  95%         { opacity: 1; border-color: rgba(168,85,247,0.9); box-shadow: 0 0 8px rgba(168,85,247,0.5); }
}

/* ── Chromatic aberration ghost labels ── */
.chroma-r, .chroma-b {
  position: absolute;
  font-family: 'JetBrains Mono', monospace; font-weight: 900;
  font-size: clamp(18px, 4vw, 28px);
  pointer-events: none; z-index: 5; opacity: 0;
  animation: chroma-fade 5s ease-in-out infinite;
}
.chroma-r { color: rgba(225,29,72,0.45); transform: translate(-4px, 1px); animation-delay: 0.05s; }
.chroma-b { color: rgba(100,200,255,0.35); transform: translate(4px,-1px); animation-delay: -0.05s; }
@keyframes chroma-fade {
  0%,80%,100% { opacity: 0; }
  85%,95%     { opacity: 1; }
}

/* ── Responsive ── */
@media(max-width:860px){
  .hero-grid { grid-template-columns: 1fr; }
  .logo-wrap { max-width: 300px; margin: 3rem auto 0; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<!-- Particle + grid canvas -->
<canvas id="bg"></canvas>

<!-- NAV -->
<nav>
  <a href="#" class="nav-brand">RS <span class="dot"></span></a>
  <ul class="nav-links">
    <li><a href="#">Sobre mí</a></li>
    <li><a href="#">Stack</a></li>
    <li><a href="#">Proyectos</a></li>
    <li><a href="#">Contacto</a></li>
  </ul>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-grid">

    <!-- Left: text -->
    <div class="hero-text">
      <p class="hero-mono">Desarrollador Full-Stack</p>
      <h1>Raúl<br><span class="h1-grad">Sebastián</span></h1>
      <p class="hero-p">Más de 15 años construyendo aplicaciones web complejas y escalables en agencias de publicidad y marketing.</p>
      <div class="btns">
        <a href="#" class="btn btn-p">Ver Proyectos</a>
        <a href="#" class="btn btn-g">Hablemos</a>
      </div>
      <div class="badges">
        <span class="badge">Laravel</span>
        <span class="badge">Angular</span>
        <span class="badge">PHP</span>
        <span class="badge">MySQL</span>
        <span class="badge">Blender</span>
        <span class="badge">WordPress</span>
      </div>
    </div>

    <!-- Right: animated logo system -->
    <div class="logo-wrap">

      <!-- Retrowave sun behind everything -->
      <div class="sun-outer">
        <div class="sun"></div>
      </div>
      <div class="sun-horizon"></div>

      <!-- Orbital rings -->
      <div class="rings">
        <div class="ring r1"></div>
        <div class="ring r2"></div>
        <div class="ring r3"></div>
      </div>

      <!-- Pulsing core glow -->
      <div class="glow-core"></div>

      <!-- 3D Logo -->
      <div class="logo-stage" id="logo3d">
        <div class="stage">
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div><div class="layer"></div>
          <div class="layer"></div><div class="layer"></div>
        </div>
      </div>

      <!-- Chromatic aberration overlays -->
      <div class="chroma-r"></div>
      <div class="chroma-b"></div>

      <!-- Scan beam -->
      <div class="scan"></div>

      <!-- Corner frame -->
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>

    </div><!-- /logo-wrap -->
  </div><!-- /hero-grid -->
</section>

<script>
/* ═══════════════════════════════════════════
   CANVAS: star field + particle network +
           animated perspective grid (bottom)
═══════════════════════════════════════════ */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* — Stars (static) — */
const STARS = Array.from({ length: 180 }, () => ({
  x: Math.random(),
  y: Math.random() * 0.7,
  r: Math.random() * 1.2 + 0.2,
  o: Math.random() * 0.6 + 0.1,
  t: Math.random() * Math.PI * 2,
  ts: 0.004 + Math.random() * 0.008,
}));

/* — Floating particles + network — */
const COLORS = ['225,29,72', '168,85,247', '251,113,133', '255,255,255'];
const PARTS  = Array.from({ length: 90 }, () => ({
  x:  Math.random() * window.innerWidth,
  y:  Math.random() * window.innerHeight * 0.75,
  vx: (Math.random() - 0.5) * 0.45,
  vy: (Math.random() - 0.5) * 0.35,
  r:  Math.random() * 1.8 + 0.4,
  o:  Math.random() * 0.45 + 0.08,
  c:  COLORS[Math.floor(Math.random() * COLORS.length)],
}));

/* — Data streams (subtle code rain) — */
const STREAM_CHARS = '<>/=[]{}01_;'.split('');
const STREAMS = Array.from({ length: 10 }, () => ({
  x:    Math.random() * window.innerWidth,
  y:   -Math.random() * 400,
  spd:  0.4 + Math.random() * 0.7,
  op:   0.04 + Math.random() * 0.1,
  col:  Math.random() < 0.6 ? '225,29,72' : '168,85,247',
  len:  8 + Math.floor(Math.random() * 10),
  chars: Array.from({ length: 18 }, () =>
    STREAM_CHARS[Math.floor(Math.random() * STREAM_CHARS.length)]),
}));

/* — Grid animation state — */
let gridOffset = 0;

function drawGrid() {
  const W = canvas.width, H = canvas.height;
  const hy = H * 0.58; // horizon

  // Vertical converging lines
  const nv = 22;
  for (let i = -nv/2; i <= nv/2; i++) {
    const xBottom = W / 2 + i * (W / nv);
    const fade = 1 - Math.abs(i) / (nv / 2);
    ctx.beginPath();
    ctx.moveTo(W / 2, hy);
    ctx.lineTo(xBottom, H);
    ctx.strokeStyle = `rgba(225,29,72,${0.12 * fade})`;
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Horizontal moving lines
  const nh = 10;
  gridOffset = (gridOffset + 0.003) % 1;
  for (let j = 0; j < nh; j++) {
    const t  = ((j / nh) + gridOffset) % 1;
    const y  = hy + (H - hy) * Math.pow(t, 0.55);
    const s  = (y - hy) / (H - hy);
    const x1 = W / 2 - s * W * 0.85;
    const x2 = W / 2 + s * W * 0.85;
    ctx.beginPath();
    ctx.moveTo(x1, y);
    ctx.lineTo(x2, y);
    ctx.strokeStyle = `rgba(225,29,72,${0.09 * s})`;
    ctx.lineWidth = 0.6;
    ctx.stroke();
  }
}

function drawStars(t) {
  const W = canvas.width, H = canvas.height;
  STARS.forEach(s => {
    s.t += s.ts;
    const flicker = 0.7 + 0.3 * Math.sin(s.t);
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.o * flicker})`;
    ctx.fill();
  });
}

function drawParticles() {
  const W = canvas.width, H = canvas.height;
  PARTS.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H * 0.78) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${p.c},${p.o})`;
    ctx.fill();
  });
  // Connections
  for (let i = 0; i < PARTS.length; i++) {
    for (let j = i + 1; j < PARTS.length; j++) {
      const dx = PARTS[i].x - PARTS[j].x;
      const dy = PARTS[i].y - PARTS[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 110) {
        ctx.beginPath();
        ctx.moveTo(PARTS[i].x, PARTS[i].y);
        ctx.lineTo(PARTS[j].x, PARTS[j].y);
        ctx.strokeStyle = `rgba(255,255,255,${(1 - d/110) * 0.12})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function drawStreams() {
  const W = canvas.width, H = canvas.height;
  ctx.font = "11px 'JetBrains Mono', monospace";
  STREAMS.forEach(s => {
    s.y += s.spd;
    if (s.y > H + 300) {
      s.y = -200;
      s.x = Math.random() * W;
    }
    // Occasionally scramble a char
    if (Math.random() < 0.02) {
      const ri = Math.floor(Math.random() * s.chars.length);
      s.chars[ri] = STREAM_CHARS[Math.floor(Math.random() * STREAM_CHARS.length)];
    }
    s.chars.forEach((ch, i) => {
      const fade = 1 - i / s.chars.length;
      ctx.fillStyle = `rgba(${s.col},${s.op * fade})`;
      ctx.fillText(ch, s.x, s.y - i * 14);
    });
  });
}

function animate(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawGrid();
  drawStars(t);
  drawParticles();
  drawStreams();
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

/* ═══════════════════════════════════
   GLITCH: random trigger every 4-7s
═══════════════════════════════════ */
const logo3d = document.getElementById('logo3d');

function scheduleGlitch() {
  const delay = 4000 + Math.random() * 3000;
  setTimeout(() => {
    logo3d.classList.add('glitching');
    // Brief secondary glitch
    setTimeout(() => logo3d.classList.remove('glitching'), 350);
    setTimeout(() => {
      if (Math.random() < 0.5) {
        logo3d.classList.add('glitching');
        setTimeout(() => logo3d.classList.remove('glitching'), 200);
      }
    }, 500);
    scheduleGlitch();
  }, delay);
}
scheduleGlitch();

/* ═══════════════════════════════════
   Ring dots — lit nodes on rings
   (pure CSS approach via ring-dot divs)
═══════════════════════════════════ */
function addRingDots(ring, count) {
  const r = ring.offsetWidth / 2;
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'ring-dot';
    const angle = (i / count) * 360;
    const rad   = angle * Math.PI / 180;
    const x = r * Math.cos(rad);
    const y = r * Math.sin(rad);
    dot.style.cssText = `
      margin-left: ${x - 3}px;
      margin-top:  ${y - 3}px;
    `;
    ring.appendChild(dot);
  }
}
// Dots on ring 1 after it has dimensions
window.addEventListener('load', () => {
  const r1 = document.querySelector('.r1');
  const r2 = document.querySelector('.r2');
  if (r1) addRingDots(r1, 6);
  if (r2) addRingDots(r2, 4);
});
</script>
