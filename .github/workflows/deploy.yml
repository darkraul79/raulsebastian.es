name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: darkraul79/raulsebastian.es

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Job 0: Detectar qué ha cambiado para elegir estrategia de deploy
  # ──────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detectar cambios
    runs-on: ubuntu-latest
    outputs:
      needs-rebuild: ${{ steps.check.outputs.needs-rebuild }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Comprobar archivos que requieren rebuild
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          echo "Archivos cambiados:"
          echo "$CHANGED"

          NEEDS_REBUILD=false
          while IFS= read -r file; do
            case "$file" in
              composer.json|composer.lock|\
              package.json|package-lock.json|\
              docker/*|Dockerfile|\
              docker-compose.yml|\
              vite.config.js|\
              resources/css/*|resources/js/*)
                NEEDS_REBUILD=true
                echo "  → Rebuild necesario por: $file"
                ;;
            esac
          done <<< "$CHANGED"

          echo "needs-rebuild=$NEEDS_REBUILD" >> "$GITHUB_OUTPUT"
          echo "Resultado: needs-rebuild=$NEEDS_REBUILD"

  # ──────────────────────────────────────────────────────────────────
  # Job 1: Construir y publicar imagen (solo si hace falta rebuild)
  # ──────────────────────────────────────────────────────────────────
  build-and-push:
    name: Construir imagen Docker
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.needs-rebuild == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadatos de la imagen
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ──────────────────────────────────────────────────────────────────
  # Job 2a: Deploy COMPLETO (imagen nueva)
  # ──────────────────────────────────────────────────────────────────
  deploy-full:
    name: Deploy completo (imagen nueva)
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: needs.detect-changes.outputs.needs-rebuild == 'true'
    environment: production

    steps:
      - name: Deploy completo en el servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            if [ ! -d /srv/raulsebastian.es/.git ]; then
              echo "==> Clonando repositorio por primera vez..."
              git clone -b master https://github.com/darkraul79/raulsebastian.es.git /srv/raulsebastian.es
            fi

            cd /srv/raulsebastian.es

            if [ ! -f .env ]; then
              echo "ERROR: Falta .env en /srv/raulsebastian.es — copia .env.production.example como .env"
              exit 1
            fi

            echo "==> Actualizando código fuente..."
            git fetch origin master
            git reset --hard origin/master

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            export APP_VERSION=sha-$(echo "${{ github.sha }}" | cut -c1-7)
            export DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

            echo "==> Liberando espacio en disco..."
            docker images --format "{{.Repository}}:{{.Tag}}" | \
              grep "ghcr.io/darkraul79/raulsebastian.es:sha-" | \
              tail -n +3 | \
              xargs -r docker rmi 2>/dev/null || true
            docker image prune -f

            docker compose pull app
            docker compose up -d --no-deps --remove-orphans app nginx

            docker image prune -f

            echo "✅ Deploy COMPLETO: $APP_VERSION"

  # ──────────────────────────────────────────────────────────────────
  # Job 2b: Deploy RÁPIDO (solo PHP/contenido/markdown, sin rebuild)
  # ──────────────────────────────────────────────────────────────────
  deploy-fast:
    name: Deploy rápido (solo código)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.needs-rebuild == 'false'
    environment: production

    steps:
      - name: Deploy rápido en el servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e

            cd /srv/raulsebastian.es

            echo "==> Actualizando código fuente..."
            git fetch origin master
            git reset --hard origin/master

            echo "==> Recargando cachés Laravel en el contenedor..."
            docker compose exec -T app php artisan config:cache
            docker compose exec -T app php artisan route:cache
            docker compose exec -T app php artisan view:cache
            docker compose exec -T app php artisan event:cache

            echo "✅ Deploy RÁPIDO completado en segundos"
